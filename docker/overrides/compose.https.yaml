# HTTPS with Let's Encrypt override
# Usage: docker compose -f compose.yaml -f overrides/compose.https.yaml up -d
services:
  frontend:
    ports:
      - "80:8080"
      - "443:443"
    environment:
      HTTPS: "true"
      LETSENCRYPT_HOST: ${NGINX_PROXY_HOSTS:-erp.example.com}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-your@email.com}
